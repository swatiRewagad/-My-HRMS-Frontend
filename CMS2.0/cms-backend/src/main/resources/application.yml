server:
  port: 8082
  error:
    include-message: always
    include-stacktrace: on_param
  tomcat:
    threads:
      max: 400
      min-spare: 50
    max-connections: 10000
    accept-count: 500
    connection-timeout: 5000
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/cms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&rewriteBatchedStatements=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 5000
      pool-name: CMS-HikariPool
      leak-detection-threshold: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true
        generate_statistics: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        max.block.ms: ${KAFKA_MAX_BLOCK_MS:5000}
        delivery.timeout.ms: ${KAFKA_DELIVERY_TIMEOUT:10000}
        request.timeout.ms: ${KAFKA_REQUEST_TIMEOUT:5000}
  cache:
    type: none

keycloak:
  admin:
    server-url: ${KEYCLOAK_URL:http://localhost:8080}
    realm: ${KEYCLOAK_REALM:cms}
    client-id: ${KEYCLOAK_ADMIN_CLIENT:admin-cli}
    username: ${KEYCLOAK_ADMIN_USER:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

cms:
  ocr:
    # Provider: gemini | openai | huggingface | azure
    provider: ${OCR_PROVIDER:groq}
    # ── Gemini (default) ──
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-model: ${GEMINI_MODEL:gemini-2.0-flash}
    # ── OpenAI ──
    openai-api-key: ${OPENAI_API_KEY:}
    openai-model: ${OPENAI_MODEL:gpt-4o-mini}
    # ── HuggingFace ──
    huggingface-api-key: ${HUGGINGFACE_API_KEY:}
    huggingface-model: ${HUGGINGFACE_MODEL:microsoft/trocr-large-printed}
    huggingface-inference-url: ${HUGGINGFACE_URL:https://api-inference.huggingface.co/models/}
    # ── Groq (free, fast) ──
    groq-api-key: ${GROQ_API_KEY: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}
    groq-model: ${GROQ_MODEL:meta-llama/llama-4-scout-17b-16e-instruct}
    # ── Azure Document Intelligence ──
    azure-endpoint: ${AZURE_DOC_ENDPOINT:}
    azure-api-key: ${AZURE_DOC_API_KEY:}
    azure-model: ${AZURE_DOC_MODEL:prebuilt-read}
  attachments:
    root-path: ${CMS_ATTACHMENTS_PATH:C:/cms-attachments}
    max-file-size: ${CMS_MAX_FILE_SIZE:52428800}
    chunk-size: ${CMS_CHUNK_SIZE:5242880}
    allowed-types: ${CMS_ALLOWED_TYPES:pdf,png,jpg,jpeg,doc,docx,xls,xlsx,txt,csv,zip}
    max-files-per-complaint: ${CMS_MAX_FILES:10}
    temp-dir: ${CMS_TEMP_DIR:temp-chunks}
  rate-limit:
    complaints-per-minute: ${RATE_LIMIT_CPM:10}
    api-requests-per-second: ${RATE_LIMIT_RPS:100}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: cms-backend

logging:
  level:
    com.hrms.cms: INFO
    org.hibernate.SQL: WARN

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:mysql://cms-mysql:3306/cms_db?useSSL=true&allowPublicKeyRetrieval=false&serverTimezone=UTC&rewriteBatchedStatements=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 100
      minimum-idle: 20
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 3000
      pool-name: CMS-HikariPool-Prod
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
  cache:
    type: none

server:
  tomcat:
    threads:
      max: 800
      min-spare: 100
    max-connections: 20000
    accept-count: 1000

logging:
  level:
    com.hrms.cms: WARN
    org.hibernate.SQL: ERROR
