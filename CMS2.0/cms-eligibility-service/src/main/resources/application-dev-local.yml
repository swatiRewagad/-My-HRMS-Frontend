spring:
  datasource:
    url: jdbc:h2:mem:cms_eligibility;DB_CLOSE_DELAY=-1;MODE=Oracle
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: PUBLIC
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      platform: h2
  h2:
    console:
      enabled: true
      path: /h2-console

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      group-id: cms-eligibility-dev
    listener:
      type: single
      missing-topics-fatal: false

logging:
  level:
    com.rbi.cms: DEBUG
    org.hibernate.SQL: DEBUG
