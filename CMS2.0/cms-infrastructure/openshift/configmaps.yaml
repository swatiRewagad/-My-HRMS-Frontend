# ============================================================
# CMS 2.0 — OpenShift ConfigMaps for All Microservices
# Namespace: rbi-cms
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: rbi-cms
  labels:
    app.kubernetes.io/part-of: rbi-cms

---
# ============================================================
# 1. SHARED CONFIG — Common across all services
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-common-config
  namespace: rbi-cms
  labels:
    app.kubernetes.io/part-of: rbi-cms
data:
  SPRING_PROFILES_ACTIVE: "openshift"
  TZ: "Asia/Kolkata"

  # Oracle Database
  DB_HOST: "oracle-db.rbi-cms.svc.cluster.local"
  DB_PORT: "1521"
  DB_SERVICE: "CMSDB"
  DB_URL: "jdbc:oracle:thin:@oracle-db.rbi-cms.svc.cluster.local:1521/CMSDB"
  DB_DRIVER: "oracle.jdbc.OracleDriver"
  DB_HIBERNATE_DIALECT: "org.hibernate.dialect.OracleDialect"
  DB_DDL_AUTO: "validate"
  DB_POOL_SIZE: "10"
  DB_MAX_POOL_SIZE: "20"

  # Kafka
  KAFKA_BOOTSTRAP_SERVERS: "kafka-cluster-kafka-bootstrap.rbi-cms.svc.cluster.local:9092"
  KAFKA_SECURITY_PROTOCOL: "PLAINTEXT"
  KAFKA_AUTO_OFFSET_RESET: "earliest"
  KAFKA_ENABLE_AUTO_COMMIT: "false"

  # Keycloak
  KEYCLOAK_URL: "http://keycloak.rbi-cms.svc.cluster.local:8080"
  KEYCLOAK_REALM: "rbi-cms"
  KEYCLOAK_ISSUER_URI: "http://keycloak.rbi-cms.svc.cluster.local:8080/realms/rbi-cms"
  KEYCLOAK_JWK_SET_URI: "http://keycloak.rbi-cms.svc.cluster.local:8080/realms/rbi-cms/protocol/openid-connect/certs"

  # OpenSearch
  OPENSEARCH_HOST: "opensearch.rbi-cms.svc.cluster.local"
  OPENSEARCH_PORT: "9200"
  OPENSEARCH_SCHEME: "http"

  # Nexus (for Maven builds)
  NEXUS_URL: "http://nexus.rbi-cms.svc.cluster.local:8081/repository/maven-public/"

---
# ============================================================
# 2. KAFKA TOPICS CONFIG
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-kafka-topics-config
  namespace: rbi-cms
data:
  TOPIC_COMPLAINT_INGESTED: "complaint.ingested"
  TOPIC_COMPLAINT_ASSIGNED: "complaint.assigned"
  TOPIC_COMPLAINT_IN_PROGRESS: "complaint.inprogress"
  TOPIC_COMPLAINT_ESCALATED: "complaint.escalated"
  TOPIC_COMPLAINT_RESOLVED: "complaint.resolved"
  TOPIC_COMPLAINT_CLOSED: "complaint.closed"
  TOPIC_COMPLAINT_DLQ: "complaint.dlq"
  KAFKA_PARTITIONS: "6"
  KAFKA_REPLICATION_FACTOR: "3"

---
# ============================================================
# 3. CMS API GATEWAY
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-api-gateway-config
  namespace: rbi-cms
  labels:
    app: cms-api-gateway
data:
  SERVER_PORT: "8080"
  APPLICATION_NAME: "cms-api-gateway"

  # Rate Limiting
  RATE_LIMIT_REQUESTS_PER_SECOND: "100"
  RATE_LIMIT_BURST: "200"

  # Routing — internal service URLs
  ROUTE_INGESTION_URI: "http://cms-ingestion-service.rbi-cms.svc.cluster.local:8080"
  ROUTE_ELIGIBILITY_URI: "http://cms-eligibility-service.rbi-cms.svc.cluster.local:8080"
  ROUTE_WORKFLOW_URI: "http://cms-workflow-service.rbi-cms.svc.cluster.local:8080"
  ROUTE_ASSIGNMENT_URI: "http://cms-assignment-service.rbi-cms.svc.cluster.local:8080"
  ROUTE_SEARCH_URI: "http://cms-search-service.rbi-cms.svc.cluster.local:8080"
  ROUTE_NOTIFICATION_URI: "http://cms-notification-service.rbi-cms.svc.cluster.local:8080"
  ROUTE_AUDIT_URI: "http://cms-audit-service.rbi-cms.svc.cluster.local:8080"
  ROUTE_STORAGE_URI: "http://cms-storage-service.rbi-cms.svc.cluster.local:8080"
  ROUTE_SLA_URI: "http://cms-sla-monitor-service.rbi-cms.svc.cluster.local:8080"

  # CORS
  CORS_ALLOWED_ORIGINS: "https://cms-portal.rbi.org.in,https://cms-officer.rbi.org.in"
  CORS_ALLOWED_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
  CORS_ALLOWED_HEADERS: "*"

  # JWT Validation
  JWT_ISSUER_URI: "http://keycloak.rbi-cms.svc.cluster.local:8080/realms/rbi-cms"

  application.yml: |
    server:
      port: 8080
    spring:
      application:
        name: cms-api-gateway
      cloud:
        gateway:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins: ${CORS_ALLOWED_ORIGINS}
                allowedMethods: ${CORS_ALLOWED_METHODS}
                allowedHeaders: ${CORS_ALLOWED_HEADERS}
                allowCredentials: true
          routes:
            - id: ingestion-service
              uri: ${ROUTE_INGESTION_URI}
              predicates:
                - Path=/api/complaints/**
            - id: eligibility-service
              uri: ${ROUTE_ELIGIBILITY_URI}
              predicates:
                - Path=/api/eligibility/**
            - id: search-service
              uri: ${ROUTE_SEARCH_URI}
              predicates:
                - Path=/api/search/**
            - id: workflow-service
              uri: ${ROUTE_WORKFLOW_URI}
              predicates:
                - Path=/api/workflow/**
            - id: storage-service
              uri: ${ROUTE_STORAGE_URI}
              predicates:
                - Path=/api/documents/**
            - id: audit-service
              uri: ${ROUTE_AUDIT_URI}
              predicates:
                - Path=/api/audit/**
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: ${JWT_ISSUER_URI}

---
# ============================================================
# 4. CMS ELIGIBILITY SERVICE
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-eligibility-service-config
  namespace: rbi-cms
  labels:
    app: cms-eligibility-service
data:
  SERVER_PORT: "8080"
  APPLICATION_NAME: "cms-eligibility-service"

  # MRE Check Config
  MRE_REQUIRED: "true"
  MRE_WAITING_PERIOD_DAYS: "30"
  MRE_COMPLAINT_AMOUNT_THRESHOLD: "2000000"

  # Eligibility Rules
  ELIGIBLE_ENTITY_TYPES: "BANK,NBFC,PPI"
  MAX_COMPLAINT_AMOUNT: "20000000"
  FILING_WINDOW_DAYS: "365"

  application.yml: |
    server:
      port: 8080
    spring:
      application:
        name: cms-eligibility-service
      datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: ${DB_DRIVER}
      jpa:
        hibernate:
          ddl-auto: ${DB_DDL_AUTO}
        properties:
          hibernate:
            dialect: ${DB_HIBERNATE_DIALECT}
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: ${KEYCLOAK_ISSUER_URI}
              jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}
    eligibility:
      mre:
        required: ${MRE_REQUIRED}
        waiting-period-days: ${MRE_WAITING_PERIOD_DAYS}
        amount-threshold: ${MRE_COMPLAINT_AMOUNT_THRESHOLD}
      filing-window-days: ${FILING_WINDOW_DAYS}
      max-amount: ${MAX_COMPLAINT_AMOUNT}

---
# ============================================================
# 5. CMS INGESTION SERVICE
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-ingestion-service-config
  namespace: rbi-cms
  labels:
    app: cms-ingestion-service
data:
  SERVER_PORT: "8080"
  APPLICATION_NAME: "cms-ingestion-service"
  KAFKA_PRODUCER_ACKS: "all"
  KAFKA_PRODUCER_RETRIES: "3"
  MAX_ATTACHMENT_SIZE_MB: "10"
  COMPLAINT_ID_PREFIX: "CMP"

  application.yml: |
    server:
      port: 8080
    spring:
      application:
        name: cms-ingestion-service
      datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: ${DB_DRIVER}
      jpa:
        hibernate:
          ddl-auto: ${DB_DDL_AUTO}
        properties:
          hibernate:
            dialect: ${DB_HIBERNATE_DIALECT}
      kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
        producer:
          acks: ${KAFKA_PRODUCER_ACKS}
          retries: ${KAFKA_PRODUCER_RETRIES}
          key-serializer: org.apache.kafka.common.serialization.StringSerializer
          value-serializer: org.apache.kafka.common.serialization.StringSerializer
      servlet:
        multipart:
          max-file-size: ${MAX_ATTACHMENT_SIZE_MB}MB
          max-request-size: ${MAX_ATTACHMENT_SIZE_MB}MB
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: ${KEYCLOAK_ISSUER_URI}
              jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}
    complaint:
      id-prefix: ${COMPLAINT_ID_PREFIX}

---
# ============================================================
# 6. CMS WORKFLOW SERVICE
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-workflow-service-config
  namespace: rbi-cms
  labels:
    app: cms-workflow-service
data:
  SERVER_PORT: "8080"
  APPLICATION_NAME: "cms-workflow-service"
  WORKFLOW_ENGINE: "jbpm"
  BPMN_PROCESS_ID: "com.rbi.cms.complaint-lifecycle"
  KAFKA_CONSUMER_GROUP: "cms-workflow-group"
  KIESESSION_STRATEGY: "PER_PROCESS_INSTANCE"

  application.yml: |
    server:
      port: 8080
    spring:
      application:
        name: cms-workflow-service
      datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: ${DB_DRIVER}
      jpa:
        hibernate:
          ddl-auto: ${DB_DDL_AUTO}
        properties:
          hibernate:
            dialect: ${DB_HIBERNATE_DIALECT}
      kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
        consumer:
          group-id: ${KAFKA_CONSUMER_GROUP}
          auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET}
          enable-auto-commit: ${KAFKA_ENABLE_AUTO_COMMIT}
          key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
          value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        producer:
          acks: all
          key-serializer: org.apache.kafka.common.serialization.StringSerializer
          value-serializer: org.apache.kafka.common.serialization.StringSerializer
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: ${KEYCLOAK_ISSUER_URI}
              jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}
    workflow:
      engine: ${WORKFLOW_ENGINE}
      process-id: ${BPMN_PROCESS_ID}
      kiesession-strategy: ${KIESESSION_STRATEGY}

---
# ============================================================
# 7. CMS RULES SERVICE (Drools)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-rules-service-config
  namespace: rbi-cms
  labels:
    app: cms-rules-service
data:
  SERVER_PORT: "8080"
  APPLICATION_NAME: "cms-rules-service"
  KAFKA_CONSUMER_GROUP: "cms-rules-group"
  RULES_RELOAD_INTERVAL_MINUTES: "30"

  application.yml: |
    server:
      port: 8080
    spring:
      application:
        name: cms-rules-service
      datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: ${DB_DRIVER}
      jpa:
        hibernate:
          ddl-auto: ${DB_DDL_AUTO}
        properties:
          hibernate:
            dialect: ${DB_HIBERNATE_DIALECT}
      kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
        consumer:
          group-id: ${KAFKA_CONSUMER_GROUP}
          auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET}
          enable-auto-commit: ${KAFKA_ENABLE_AUTO_COMMIT}
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: ${KEYCLOAK_ISSUER_URI}
              jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}
    rules:
      reload-interval-minutes: ${RULES_RELOAD_INTERVAL_MINUTES}

---
# ============================================================
# 8. CMS ASSIGNMENT SERVICE
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-assignment-service-config
  namespace: rbi-cms
  labels:
    app: cms-assignment-service
data:
  SERVER_PORT: "8080"
  APPLICATION_NAME: "cms-assignment-service"
  KAFKA_CONSUMER_GROUP: "cms-assignment-group"
  ASSIGNMENT_STRATEGY: "ROUND_ROBIN"
  MAX_CASES_PER_OFFICER: "50"
  AUTO_REASSIGN_ON_ESCALATION: "true"

  application.yml: |
    server:
      port: 8080
    spring:
      application:
        name: cms-assignment-service
      datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: ${DB_DRIVER}
      jpa:
        hibernate:
          ddl-auto: ${DB_DDL_AUTO}
        properties:
          hibernate:
            dialect: ${DB_HIBERNATE_DIALECT}
      kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
        consumer:
          group-id: ${KAFKA_CONSUMER_GROUP}
          auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET}
          enable-auto-commit: ${KAFKA_ENABLE_AUTO_COMMIT}
        producer:
          acks: all
          key-serializer: org.apache.kafka.common.serialization.StringSerializer
          value-serializer: org.apache.kafka.common.serialization.StringSerializer
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: ${KEYCLOAK_ISSUER_URI}
              jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}
    assignment:
      strategy: ${ASSIGNMENT_STRATEGY}
      max-cases-per-officer: ${MAX_CASES_PER_OFFICER}
      auto-reassign-on-escalation: ${AUTO_REASSIGN_ON_ESCALATION}

---
# ============================================================
# 9. CMS SLA MONITOR SERVICE
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-sla-monitor-service-config
  namespace: rbi-cms
  labels:
    app: cms-sla-monitor-service
data:
  SERVER_PORT: "8080"
  APPLICATION_NAME: "cms-sla-monitor-service"
  KAFKA_CONSUMER_GROUP: "cms-sla-group"

  # SLA Timelines (in hours)
  SLA_ACKNOWLEDGEMENT_HOURS: "24"
  SLA_RESOLUTION_DAYS: "30"
  SLA_ESCALATION_LEVEL1_DAYS: "15"
  SLA_ESCALATION_LEVEL2_DAYS: "25"
  SLA_CHECK_CRON: "0 0 */2 * * *"

  application.yml: |
    server:
      port: 8080
    spring:
      application:
        name: cms-sla-monitor-service
      datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: ${DB_DRIVER}
      jpa:
        hibernate:
          ddl-auto: ${DB_DDL_AUTO}
        properties:
          hibernate:
            dialect: ${DB_HIBERNATE_DIALECT}
      kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
        consumer:
          group-id: ${KAFKA_CONSUMER_GROUP}
          auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET}
          enable-auto-commit: ${KAFKA_ENABLE_AUTO_COMMIT}
        producer:
          acks: all
          key-serializer: org.apache.kafka.common.serialization.StringSerializer
          value-serializer: org.apache.kafka.common.serialization.StringSerializer
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: ${KEYCLOAK_ISSUER_URI}
              jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}
    sla:
      acknowledgement-hours: ${SLA_ACKNOWLEDGEMENT_HOURS}
      resolution-days: ${SLA_RESOLUTION_DAYS}
      escalation:
        level1-days: ${SLA_ESCALATION_LEVEL1_DAYS}
        level2-days: ${SLA_ESCALATION_LEVEL2_DAYS}
      check-cron: ${SLA_CHECK_CRON}

---
# ============================================================
# 10. CMS NOTIFICATION SERVICE
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-notification-service-config
  namespace: rbi-cms
  labels:
    app: cms-notification-service
data:
  SERVER_PORT: "8080"
  APPLICATION_NAME: "cms-notification-service"
  KAFKA_CONSUMER_GROUP: "cms-notification-group"

  # Email Config
  SMTP_HOST: "smtp.rbi.org.in"
  SMTP_PORT: "587"
  SMTP_FROM: "noreply-cms@rbi.org.in"
  SMTP_STARTTLS: "true"

  # SMS Config
  SMS_GATEWAY_URL: "https://sms-gateway.rbi.org.in/api/send"
  SMS_SENDER_ID: "RBICMS"
  SMS_ENABLED: "true"

  # Template
  NOTIFICATION_ENABLED_CHANNELS: "EMAIL,SMS"

  application.yml: |
    server:
      port: 8080
    spring:
      application:
        name: cms-notification-service
      datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: ${DB_DRIVER}
      jpa:
        hibernate:
          ddl-auto: ${DB_DDL_AUTO}
        properties:
          hibernate:
            dialect: ${DB_HIBERNATE_DIALECT}
      kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
        consumer:
          group-id: ${KAFKA_CONSUMER_GROUP}
          auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET}
          enable-auto-commit: ${KAFKA_ENABLE_AUTO_COMMIT}
      mail:
        host: ${SMTP_HOST}
        port: ${SMTP_PORT}
        properties:
          mail:
            smtp:
              starttls:
                enable: ${SMTP_STARTTLS}
              auth: true
    notification:
      email:
        from: ${SMTP_FROM}
      sms:
        gateway-url: ${SMS_GATEWAY_URL}
        sender-id: ${SMS_SENDER_ID}
        enabled: ${SMS_ENABLED}
      channels: ${NOTIFICATION_ENABLED_CHANNELS}

---
