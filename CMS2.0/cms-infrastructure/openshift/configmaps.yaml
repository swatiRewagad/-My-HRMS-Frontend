---
# ============================================================
# 12. CMS STORAGE SERVICE
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-storage-service-config
  namespace: rbi-cms
  labels:
    app: cms-storage-service
data:
  SERVER_PORT: "8080"
  APPLICATION_NAME: "cms-storage-service"

  # Storage Config
  STORAGE_TYPE: "filesystem"
  STORAGE_BASE_PATH: "/data/cms-documents"
  MAX_FILE_SIZE_MB: "25"
  ALLOWED_EXTENSIONS: "pdf,jpg,jpeg,png,doc,docx,xls,xlsx"
  VIRUS_SCAN_ENABLED: "true"

  application.yml: |
    server:
      port: 8080
    spring:
      application:
        name: cms-storage-service
      datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: ${DB_DRIVER}
      jpa:
        hibernate:
          ddl-auto: ${DB_DDL_AUTO}
        properties:
          hibernate:
            dialect: ${DB_HIBERNATE_DIALECT}
      servlet:
        multipart:
          max-file-size: ${MAX_FILE_SIZE_MB}MB
          max-request-size: ${MAX_FILE_SIZE_MB}MB
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: ${KEYCLOAK_ISSUER_URI}
