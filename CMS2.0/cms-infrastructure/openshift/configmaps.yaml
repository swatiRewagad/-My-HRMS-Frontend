    storage:
      type: ${STORAGE_TYPE}
      base-path: ${STORAGE_BASE_PATH}
      allowed-extensions: ${ALLOWED_EXTENSIONS}
      virus-scan-enabled: ${VIRUS_SCAN_ENABLED}

---
# ============================================================
# 13. CMS SEARCH SERVICE (OpenSearch)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-search-service-config
  namespace: rbi-cms
  labels:
    app: cms-search-service
data:
  SERVER_PORT: "8080"
  APPLICATION_NAME: "cms-search-service"
  KAFKA_CONSUMER_GROUP: "cms-search-group"

  # OpenSearch
  OPENSEARCH_INDEX_COMPLAINTS: "cms-complaints"
  OPENSEARCH_INDEX_AUDIT: "cms-audit-logs"
  OPENSEARCH_REPLICAS: "1"
  OPENSEARCH_SHARDS: "3"
  OPENSEARCH_REFRESH_INTERVAL: "5s"

  application.yml: |
    server:
      port: 8080
    spring:
      application:
        name: cms-search-service
      kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
        consumer:
          group-id: ${KAFKA_CONSUMER_GROUP}
          auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET}
          enable-auto-commit: ${KAFKA_ENABLE_AUTO_COMMIT}
      security:
        oauth2:
          resourceserver:
            jwt:
              issuer-uri: ${KEYCLOAK_ISSUER_URI}
              jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}
    opensearch:
      host: ${OPENSEARCH_HOST}
      port: ${OPENSEARCH_PORT}
      scheme: ${OPENSEARCH_SCHEME}
      index:
        complaints: ${OPENSEARCH_INDEX_COMPLAINTS}
        audit: ${OPENSEARCH_INDEX_AUDIT}
      replicas: ${OPENSEARCH_REPLICAS}
      shards: ${OPENSEARCH_SHARDS}
      refresh-interval: ${OPENSEARCH_REFRESH_INTERVAL}

---
# ============================================================
# 14. CMS OUTBOX PUBLISHER
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-outbox-publisher-config
  namespace: rbi-cms
  labels:
    app: cms-outbox-publisher
data:
  SERVER_PORT: "8080"
  APPLICATION_NAME: "cms-outbox-publisher"

  # Outbox Polling
  OUTBOX_POLL_INTERVAL_MS: "5000"
  OUTBOX_BATCH_SIZE: "100"
  OUTBOX_MAX_RETRIES: "5"
  OUTBOX_CLEANUP_CRON: "0 0 2 * * *"
  OUTBOX_RETENTION_DAYS: "7"

  application.yml: |
    server:
      port: 8080
    spring:
      application:
        name: cms-outbox-publisher
      datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: ${DB_DRIVER}
      jpa:
        hibernate:
          ddl-auto: ${DB_DDL_AUTO}
        properties:
          hibernate:
            dialect: ${DB_HIBERNATE_DIALECT}
      kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
        producer:
          acks: all
          retries: 3
          key-serializer: org.apache.kafka.common.serialization.StringSerializer
          value-serializer: org.apache.kafka.common.serialization.StringSerializer
          properties:
            enable.idempotence: true
            max.in.flight.requests.per.connection: 1
    outbox:
      poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS}
      batch-size: ${OUTBOX_BATCH_SIZE}
      max-retries: ${OUTBOX_MAX_RETRIES}
      cleanup:
        cron: ${OUTBOX_CLEANUP_CRON}
        retention-days: ${OUTBOX_RETENTION_DAYS}

---
# ============================================================
# 15. CMS PORTAL FRONTEND
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-portal-frontend-config
  namespace: rbi-cms
  labels:
    app: cms-portal-frontend
data:
  nginx.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      # Angular routing — fallback to index.html
      location / {
        try_files $uri $uri/ /index.html;
      }

      # Runtime config (no cache — regenerated on each deploy)
      location /assets/config.json {
        alias /usr/share/nginx/html/assets/config.json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
      }

      # API proxy to gateway (same-origin, no CORS needed)
      location /api/ {
        proxy_pass http://cms-api-gateway.rbi-cms.svc.cluster.local:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        client_max_body_size 50M;
      }

      # Health check
      location /health {
        return 200 '{"status":"UP"}';
        add_header Content-Type application/json;
      }

      # Cache static assets
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }

      # Security headers
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

  # Runtime env vars — injected via envsubst into config.json at container start
  API_BASE_URL: ""
  KEYCLOAK_URL: "https://keycloak-rbi-cms.apps.ocpvcl.rebit.org.in"
  KEYCLOAK_REALM: "cms"
  KEYCLOAK_CLIENT_ID: "cms-frontend"

---
# ============================================================
# 16. CMS OFFICER FRONTEND (cms-frontend)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-officer-frontend-config
  namespace: rbi-cms
  labels:
    app: cms-officer-frontend
data:
  nginx.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      # Angular routing — fallback to index.html
      location / {
        try_files $uri $uri/ /index.html;
      }

      # API proxy to backend (monolith)
      location /api/ {
        proxy_pass http://cms-backend.rbi-cms.svc.cluster.local:8082/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
      }

      # Health check
      location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
      }

      # Cache static assets
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }

      # Security headers
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://keycloak.rbi.org.in;" always;
    }

  # Runtime env vars for config-template.json (injected via envsubst at container start)
  API_BASE_URL: "/api"
  KEYCLOAK_URL: "https://keycloak.rbi.org.in"
  KEYCLOAK_REALM: "rbi-cms"
  KEYCLOAK_CLIENT_ID: "cms-officer-portal"

---
# ============================================================
# 17. CMS BACKEND (Monolith — RBIO Officer Backend)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cms-backend-config
  namespace: rbi-cms
  labels:
    app: cms-backend
data:
  SERVER_PORT: "8082"
  APPLICATION_NAME: "cms-backend"
  SPRING_PROFILES_ACTIVE: "openshift"

  # Tomcat tuning
  TOMCAT_MAX_THREADS: "400"
  TOMCAT_MIN_SPARE: "50"
  TOMCAT_MAX_CONNECTIONS: "10000"

  # HikariCP
  DB_MAX_POOL_SIZE: "50"
  DB_POOL_SIZE: "10"

  # Cache
  CACHE_TYPE: "hazelcast"

  # OCR
  OCR_CHAIN: "groq, paddle"
  PADDLE_OCR_URL: "http://cms-paddle-ocr.rbi-cms.svc.cluster.local:8100"

  # Attachments
  CMS_ATTACHMENTS_PATH: "/data/cms/attachments"
  CMS_MAX_FILE_SIZE: "52428800"
  CMS_CHUNK_SIZE: "5242880"
  CMS_MAX_FILES: "10"

  # Rate Limiting
  RATE_LIMIT_CPM: "10"
  RATE_LIMIT_RPS: "100"

  # Anti-Automation
  ANTI_AUTO_VELOCITY_WINDOW: "60"
  ANTI_AUTO_VELOCITY_THRESHOLD: "30"
  ANTI_AUTO_MIN_FORM_MS: "3000"
  ANTI_AUTO_REQUIRE_HEADERS: "true"

  # MRE
  MRE_VERSION: "1"
  MRE_RE_WINDOW: "30"
  MRE_NPCI_WINDOW: "30"
  MRE_CARD_WINDOW: "60"
  MRE_FILING_DEADLINE: "90"
  MRE_LIMITATION_YEARS: "3"
  MRE_WINDOW_BASIS: "BUSINESS"

  # CORS
  CMS_CORS_ORIGINS: "https://cms-portal-frontend-rbi-cms.apps.ocpvcl.rebit.org.in,https://cms-officer-frontend-rbi-cms.apps.ocpvcl.rebit.org.in"
  CMS_CORS_METHODS: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
  CMS_CORS_HEADERS: "Authorization,Content-Type,X-Requested-With,X-Session-Id,X-Form-Start,X-HP-Field,Accept,Origin,Cache-Control,Pragma,X-Content-Type-Options,X-User-Roles,X-User-Role"
  CMS_CORS_ALLOW_CREDENTIALS: "true"
  CMS_CORS_MAX_AGE: "3600"

  # Similar Cases
  SIMILAR_CASES_ENABLED: "true"
  SIMILAR_CASES_INDEX: "complaints"

  # TAT
  TAT_HOUR_START: "9"
  TAT_HOUR_END: "18"
  TAT_TIMEZONE: "Asia/Kolkata"
  TAT_DEFAULT_SLA: "240"

  # Auth
  OTP_LENGTH: "6"
  OTP_EXPIRY_MINUTES: "5"
  OTP_MAX_RESEND_PER_HOUR: "5"
  OTP_MAX_VERIFY_ATTEMPTS: "3"
  CAPTCHA_LENGTH: "6"
  CAPTCHA_EXPIRY_MINUTES: "5"
  COOLOFF_PROGRESSION: "30,60,120,300,600"
  COOLOFF_MAX: "600"
  COOLOFF_RESET_MINUTES: "60"
  OTP_RATE_MOBILE_HOUR: "5"
  OTP_RATE_IP_HOUR: "20"
  LOGIN_RATE_IP_MINUTE: "10"

  # CRPC
  CRPC_MAX_PER_REVIEWER: "30"
  CRPC_OVERFLOW_TARGET: "CRPC_HEAD"

  # Logging
  LOG_LEVEL_APP: "INFO"
  LOG_LEVEL_SQL: "WARN"
