# ============================================================
# CMS 2.0 — OpenShift Secrets
# NOTE: Values are base64 encoded. Replace with actual values.
# Command: echo -n "your-value" | base64
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: cms-db-secret
  namespace: rbi-cms
  labels:
    app.kubernetes.io/part-of: rbi-cms
type: Opaque
data:
  # echo -n "cms_user" | base64
  DB_USERNAME: Y21zX3VzZXI=
  # echo -n "CHANGE_ME_IN_PRODUCTION" | base64
  DB_PASSWORD: Q0hBTkdFX01FX0lOX1BST0RVQ1RJT04=

---
apiVersion: v1
kind: Secret
metadata:
  name: cms-kafka-secret
  namespace: rbi-cms
  labels:
    app.kubernetes.io/part-of: rbi-cms
type: Opaque
data:
  # Only needed if Kafka uses SASL authentication
  KAFKA_USERNAME: ""
  KAFKA_PASSWORD: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: cms-keycloak-secret
  namespace: rbi-cms
  labels:
    app.kubernetes.io/part-of: rbi-cms
type: Opaque
data:
  # echo -n "admin" | base64
  KEYCLOAK_ADMIN_USER: YWRtaW4=
  # echo -n "CHANGE_ME" | base64
  KEYCLOAK_ADMIN_PASSWORD: Q0hBTkdFX01F

---
apiVersion: v1
kind: Secret
metadata:
  name: cms-notification-secret
  namespace: rbi-cms
  labels:
    app.kubernetes.io/part-of: rbi-cms
type: Opaque
data:
  # SMTP credentials
  SMTP_USERNAME: Y21zLW5vdGlmaWNhdGlvbkByYmkub3JnLmlu
  SMTP_PASSWORD: Q0hBTkdFX01F
  # SMS Gateway API Key
  SMS_API_KEY: Q0hBTkdFX01F

---
apiVersion: v1
kind: Secret
metadata:
  name: cms-opensearch-secret
  namespace: rbi-cms
  labels:
    app.kubernetes.io/part-of: rbi-cms
type: Opaque
data:
  OPENSEARCH_USERNAME: YWRtaW4=
  OPENSEARCH_PASSWORD: Q0hBTkdFX01F
