server:
  port: 8082
  servlet:
    context-path: /cms-ingestion

spring:
  application:
    name: cms-ingestion-service

  datasource:
    url: jdbc:oracle:thin:@${DB_HOST:localhost}:${DB_PORT:1521}/${DB_SERVICE:CMSDB}
    username: ${DB_USER:cms_ingestion}
    password: ${DB_PASSWORD:cms_ingestion}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        default_schema: CMS_INGESTION

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

cms:
  storage:
    base-path: ${STORAGE_PATH:/data/cms/attachments}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: cms-ingestion-service

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.rbi.cms: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
