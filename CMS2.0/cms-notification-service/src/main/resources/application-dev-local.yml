spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      group-id: cms-notification-dev
    listener:
      type: single
      missing-topics-fatal: false
      ack-mode: manual

cms:
  notification:
    email-enabled: false
    sms-enabled: false

logging:
  level:
    com.rbi.cms: DEBUG
