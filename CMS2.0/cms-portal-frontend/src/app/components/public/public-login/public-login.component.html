<div class="verification-page">
  <h1 class="page-title">Verification</h1>

  <div class="verify-card">
    <h2>Verify Phone Number</h2>

    <!-- Error Message -->
    @if (loginError) {
      <div class="error-banner" role="alert">
        <i class="pi pi-exclamation-circle"></i>
        {{ loginError }}
      </div>
    }

    <!-- Step 1: Phone + Captcha -->
    @if (!otpSent()) {
      <div class="verify-form">
        <div class="form-group">
          <label>Mobile Number</label>
          <div class="phone-input">
            <span class="country-code">+91</span>
            <input type="tel" maxlength="10" [(ngModel)]="mobile"
                   placeholder="Enter Mobile Number" autocomplete="tel" />
          </div>
        </div>

        <div class="captcha-section">
          <label class="captcha-label">Captcha</label>
          <div class="captcha-row">
            <div class="captcha-image-box">
              <span class="captcha-rendered">{{ captchaText }}</span>
            </div>
            <input type="text" [(ngModel)]="captchaInput" placeholder="" class="captcha-input" />
          </div>
          <div class="captcha-actions">
            <button class="icon-btn" (click)="generateCaptcha()" title="Refresh" type="button">
              <i class="pi pi-refresh"></i>
            </button>
            <button class="icon-btn" title="Audio CAPTCHA" type="button">
              <i class="pi pi-volume-up"></i>
            </button>
          </div>
        </div>

        <button class="send-otp-btn" (click)="sendOtp()" [disabled]="!mobile || !captchaInput">
          Send OTP
        </button>
      </div>
    }

    <!-- Step 2: OTP Verification -->
    @if (otpSent() && !otpVerified()) {
      <div class="otp-section">
        <div class="otp-sent-msg">
          <i class="pi pi-check-circle"></i>
          OTP sent to <strong>+91 {{ mobile }}</strong>
        </div>

        <label class="otp-label">Enter OTP</label>
        <div class="otp-inputs">
          @for (digit of otpDigits; track $index) {
            <input type="text" maxlength="1" [value]="otpDigits[$index]"
                   (input)="onOtpInput($index, $event)"
                   (keydown)="onOtpKeydown($index, $event)"
                   class="otp-box" inputmode="numeric" />
          }
        </div>

        @if (otpError) {
          <p class="field-error">{{ otpError }}</p>
        }

        <button class="send-otp-btn" (click)="verifyOtp()">Verify OTP</button>

        <div class="otp-footer">
          <button class="link-btn" (click)="resendOtp()" [disabled]="resendTimer > 0">
            {{ resendTimer > 0 ? 'Resend OTP in ' + resendTimer + 's' : 'Resend OTP' }}
          </button>
          <button class="link-btn" (click)="cancelVerification()">Change Number</button>
        </div>
      </div>
    }
  </div>
</div>
