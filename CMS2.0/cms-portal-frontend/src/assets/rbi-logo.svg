<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8a415"/>
      <stop offset="50%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#b8960c"/>
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#gold)" stroke-width="4"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- Background fill -->
  <circle cx="100" cy="100" r="86" fill="#1a1a2e"/>
  <!-- RBI Text top arc -->
  <path id="topArc" d="M 30,100 A 70,70 0 0,1 170,100" fill="none"/>
  <text font-family="serif" font-size="11" fill="#d4af37" font-weight="bold" letter-spacing="2">
    <textPath href="#topArc" startOffset="15%">RESERVE BANK OF INDIA</textPath>
  </text>
  <!-- Hindi text bottom arc -->
  <path id="bottomArc" d="M 35,110 A 68,68 0 0,0 165,110" fill="none"/>
  <text font-family="serif" font-size="11" fill="#d4af37" font-weight="bold" letter-spacing="1">
    <textPath href="#bottomArc" startOffset="12%">भारतीय रिज़र्व बैंक</textPath>
  </text>
  <!-- Tiger/Lion symbol (simplified) -->
  <g transform="translate(65, 55) scale(0.7)" fill="#d4af37">
    <!-- Body -->
    <ellipse cx="50" cy="60" rx="35" ry="22"/>
    <!-- Head -->
    <circle cx="20" cy="45" r="14"/>
    <!-- Legs -->
    <rect x="25" y="72" width="8" height="24" rx="3"/>
    <rect x="40" y="72" width="8" height="24" rx="3"/>
    <rect x="55" y="72" width="8" height="24" rx="3"/>
    <rect x="70" y="72" width="8" height="24" rx="3"/>
    <!-- Tail -->
    <path d="M 80,50 Q 95,35 90,55" stroke="#d4af37" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Palm tree -->
    <rect x="48" y="20" width="4" height="35" fill="#d4af37"/>
    <path d="M 40,20 Q 50,10 60,20" stroke="#d4af37" stroke-width="3" fill="none"/>
    <path d="M 38,25 Q 50,15 62,25" stroke="#d4af37" stroke-width="2" fill="none"/>
  </g>
  <!-- Decorative dots -->
  <circle cx="100" cy="28" r="3" fill="#d4af37"/>
  <circle cx="100" cy="172" r="3" fill="#d4af37"/>
</svg>
