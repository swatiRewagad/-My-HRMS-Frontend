<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <circle cx="50" cy="50" r="48" fill="#1a237e"/>
  <circle cx="50" cy="50" r="44" fill="none" stroke="#d4af37" stroke-width="2"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#d4af37" stroke-width="1"/>
  <!-- Ashoka Chakra simplified -->
  <circle cx="50" cy="35" r="10" fill="none" stroke="#d4af37" stroke-width="1.5"/>
  <circle cx="50" cy="35" r="2" fill="#d4af37"/>
  <!-- Spokes -->
  <g stroke="#d4af37" stroke-width="0.8">
    <line x1="50" y1="25" x2="50" y2="45"/>
    <line x1="40" y1="35" x2="60" y2="35"/>
    <line x1="43" y1="28" x2="57" y2="42"/>
    <line x1="57" y1="28" x2="43" y2="42"/>
  </g>
  <!-- Lions (simplified as triangles) -->
  <polygon points="40,48 50,38 60,48" fill="#d4af37"/>
  <!-- Base -->
  <rect x="35" y="48" width="30" height="4" fill="#d4af37" rx="1"/>
  <!-- Pillars -->
  <rect x="38" y="52" width="4" height="14" fill="#d4af37"/>
  <rect x="58" y="52" width="4" height="14" fill="#d4af37"/>
  <!-- Horse and Bull -->
  <circle cx="42" cy="62" r="3" fill="#d4af37"/>
  <circle cx="58" cy="62" r="3" fill="#d4af37"/>
  <!-- Base plate -->
  <rect x="34" y="66" width="32" height="3" fill="#d4af37" rx="1"/>
  <!-- Text: सत्यमेव जयते -->
  <text x="50" y="80" text-anchor="middle" font-family="serif" font-size="7" fill="#d4af37">सत्यमेव जयते</text>
</svg>
