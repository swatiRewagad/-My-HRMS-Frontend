<svg xmlns="http://www.w3.org/2000/svg" width="700" height="500" viewBox="0 0 700 500">
  <!-- RBI Seal - Top Left area -->
  <g transform="translate(50, 50) scale(1.4)" opacity="0.15">
    <circle cx="50" cy="50" r="48" fill="none" stroke="#9ca3af" stroke-width="2.5"/>
    <circle cx="50" cy="50" r="44" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="40" fill="none" stroke="#9ca3af" stroke-width="1"/>
    <!-- Ashoka Pillar top -->
    <circle cx="50" cy="33" r="10" fill="none" stroke="#9ca3af" stroke-width="1.2"/>
    <circle cx="50" cy="33" r="2" fill="#9ca3af"/>
    <g stroke="#9ca3af" stroke-width="0.7">
      <line x1="50" y1="23" x2="50" y2="43"/>
      <line x1="40" y1="33" x2="60" y2="33"/>
      <line x1="43" y1="26" x2="57" y2="40"/>
      <line x1="57" y1="26" x2="43" y2="40"/>
    </g>
    <polygon points="40,46 50,36 60,46" fill="#9ca3af"/>
    <rect x="35" y="46" width="30" height="4" fill="#9ca3af" rx="1"/>
    <rect x="38" y="50" width="4" height="12" fill="#9ca3af"/>
    <rect x="58" y="50" width="4" height="12" fill="#9ca3af"/>
    <circle cx="42" cy="58" r="3" fill="#9ca3af"/>
    <circle cx="58" cy="58" r="3" fill="#9ca3af"/>
    <rect x="34" y="62" width="32" height="3" fill="#9ca3af" rx="1"/>
    <!-- Hindi text around seal -->
    <text x="50" y="78" text-anchor="middle" font-family="serif" font-size="5.5" fill="#9ca3af">भारतीय रिज़र्व बैंक</text>
    <text x="50" y="86" text-anchor="middle" font-family="sans-serif" font-size="4.5" fill="#9ca3af">RESERVE BANK OF INDIA</text>
    <text x="50" y="16" text-anchor="middle" font-family="sans-serif" font-size="4.5" fill="#9ca3af">आर बी · आर बी एस</text>
    <text x="50" y="95" text-anchor="middle" font-family="sans-serif" font-size="4.5" fill="#9ca3af">RB · IOS</text>
  </g>

  <!-- Complainant ID Text - diagonal -->
  <text x="420" y="180" text-anchor="middle" font-family="'Inter', sans-serif" font-size="36" font-weight="500" fill="#9ca3af" opacity="0.15" letter-spacing="2">Complainant ID: 00002601</text>

  <!-- RBI Seal - Bottom Right area -->
  <g transform="translate(430, 260) scale(1.4)" opacity="0.15">
    <circle cx="50" cy="50" r="48" fill="none" stroke="#9ca3af" stroke-width="2.5"/>
    <circle cx="50" cy="50" r="44" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="40" fill="none" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="50" cy="33" r="10" fill="none" stroke="#9ca3af" stroke-width="1.2"/>
    <circle cx="50" cy="33" r="2" fill="#9ca3af"/>
    <g stroke="#9ca3af" stroke-width="0.7">
      <line x1="50" y1="23" x2="50" y2="43"/>
      <line x1="40" y1="33" x2="60" y2="33"/>
      <line x1="43" y1="26" x2="57" y2="40"/>
      <line x1="57" y1="26" x2="43" y2="40"/>
    </g>
    <polygon points="40,46 50,36 60,46" fill="#9ca3af"/>
    <rect x="35" y="46" width="30" height="4" fill="#9ca3af" rx="1"/>
    <rect x="38" y="50" width="4" height="12" fill="#9ca3af"/>
    <rect x="58" y="50" width="4" height="12" fill="#9ca3af"/>
    <circle cx="42" cy="58" r="3" fill="#9ca3af"/>
    <circle cx="58" cy="58" r="3" fill="#9ca3af"/>
    <rect x="34" y="62" width="32" height="3" fill="#9ca3af" rx="1"/>
    <text x="50" y="78" text-anchor="middle" font-family="serif" font-size="5.5" fill="#9ca3af">भारतीय रिज़र्व बैंक</text>
    <text x="50" y="86" text-anchor="middle" font-family="sans-serif" font-size="4.5" fill="#9ca3af">RESERVE BANK OF INDIA</text>
    <text x="50" y="16" text-anchor="middle" font-family="sans-serif" font-size="4.5" fill="#9ca3af">आर बी · आर बी एस</text>
    <text x="50" y="95" text-anchor="middle" font-family="sans-serif" font-size="4.5" fill="#9ca3af">RB · IOS</text>
  </g>

  <!-- Complainant ID Text - second row -->
  <text x="280" y="430" text-anchor="middle" font-family="'Inter', sans-serif" font-size="36" font-weight="500" fill="#9ca3af" opacity="0.15" letter-spacing="2">Complainant ID: 00002601</text>
</svg>
