spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      group-id: cms-search-dev
      enable-auto-commit: false
    listener:
      type: single
      missing-topics-fatal: false
      ack-mode: manual

cms:
  opensearch:
    host: localhost
    port: 9200
    scheme: http
    enabled: true

logging:
  level:
    com.rbi.cms: DEBUG
