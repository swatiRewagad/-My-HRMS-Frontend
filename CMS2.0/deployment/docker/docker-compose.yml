version: '3.9'

services:
  # ============================================================
  # ORACLE DATABASE
  # ============================================================
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: cms-oracle
    environment:
      ORACLE_PASSWORD: cms_admin_password
      APP_USER: cms_app
      APP_USER_PASSWORD: cms_app_password
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./init-scripts:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - cms-network

  # ============================================================
  # APACHE KAFKA (KRaft mode - no Zookeeper)
  # ============================================================
  kafka:
    image: apache/kafka:3.7.0
    container_name: cms-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: 'cms-kafka-cluster-001'
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - cms-network

  # ============================================================
  # KEYCLOAK (Identity & Access Management)
  # ============================================================
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: cms-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HTTP_PORT: 8180
    command: start-dev
    ports:
      - "8180:8180"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - cms-network

  keycloak-db:
    image: postgres:16-alpine
    container_name: cms-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cms-network

  # ============================================================
  # OPENSEARCH (Full-text search)
  # ============================================================
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: cms-opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - cms-network

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    container_name: cms-opensearch-dashboards
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - cms-network

  # ============================================================
  # KAFKA UI (Management & Monitoring)
  # ============================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cms-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: cms-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - cms-network

  # ============================================================
  # PROMETHEUS (Metrics)
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: cms-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - cms-network

  # ============================================================
  # GRAFANA (Dashboards)
  # ============================================================
  grafana:
    image: grafana/grafana:11.3.0
    container_name: cms-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - cms-network

volumes:
  oracle_data:
  kafka_data:
  keycloak_db_data:
  opensearch_data:
  grafana_data:

networks:
  cms-network:
    driver: bridge
