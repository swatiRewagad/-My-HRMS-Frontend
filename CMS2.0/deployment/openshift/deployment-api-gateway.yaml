apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-api-gateway
  namespace: rbi-cms
  labels:
    app: cms-api-gateway
    app.kubernetes.io/part-of: rbi-cms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cms-api-gateway
  template:
    metadata:
      labels:
        app: cms-api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: cms-api-gateway
          image: registry.rbi.internal/cms/api-gateway:1.0.0-SNAPSHOT
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cms-common-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cms-api-gateway-service
  namespace: rbi-cms
spec:
  selector:
    app: cms-api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: cms-api-gateway-route
  namespace: rbi-cms
spec:
  host: cms.rbi.org.in
  to:
    kind: Service
    name: cms-api-gateway-service
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
