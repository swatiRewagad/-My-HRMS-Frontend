apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-backend
  namespace: rbi-cms
  labels:
    app: cms-backend
    app.kubernetes.io/part-of: rbi-cms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cms-backend
  template:
    metadata:
      labels:
        app: cms-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: cms-backend
          image: image-registry.openshift-image-registry.svc:5000/rbi-cms/cms-backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: cms-common-config
            - secretRef:
                name: cms-db-secret
            - secretRef:
                name: cms-keycloak-secret
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "openshift"
            - name: SERVER_PORT
              value: "8080"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          volumeMounts:
            - name: attachments
              mountPath: /cms-attachments
      volumes:
        - name: attachments
          persistentVolumeClaim:
            claimName: cms-attachments-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: cms-backend
  namespace: rbi-cms
spec:
  selector:
    app: cms-backend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
