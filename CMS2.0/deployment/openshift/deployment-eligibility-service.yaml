apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-eligibility-service
  namespace: rbi-cms
  labels:
    app: cms-eligibility-service
    app.kubernetes.io/part-of: rbi-cms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cms-eligibility-service
  template:
    metadata:
      labels:
        app: cms-eligibility-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/cms-eligibility/actuator/prometheus"
    spec:
      containers:
        - name: cms-eligibility-service
          image: registry.rbi.internal/cms/eligibility-service:1.0.0-SNAPSHOT
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: cms-common-config
            - secretRef:
                name: cms-db-credentials
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /cms-eligibility/actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /cms-eligibility/actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cms-eligibility-service
  namespace: rbi-cms
spec:
  selector:
    app: cms-eligibility-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
