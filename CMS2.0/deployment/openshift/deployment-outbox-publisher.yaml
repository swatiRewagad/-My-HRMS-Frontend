apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-outbox-publisher
  namespace: rbi-cms
  labels:
    app: cms-outbox-publisher
    app.kubernetes.io/part-of: rbi-cms
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cms-outbox-publisher
  template:
    metadata:
      labels:
        app: cms-outbox-publisher
    spec:
      containers:
        - name: cms-outbox-publisher
          image: registry.rbi.internal/cms/outbox-publisher:1.0.0-SNAPSHOT
          ports:
            - containerPort: 8089
          envFrom:
            - configMapRef:
                name: cms-common-config
            - secretRef:
                name: cms-db-credentials
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8089
            initialDelaySeconds: 60
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cms-outbox-publisher
  namespace: rbi-cms
spec:
  selector:
    app: cms-outbox-publisher
  ports:
    - port: 8089
      targetPort: 8089
  type: ClusterIP
