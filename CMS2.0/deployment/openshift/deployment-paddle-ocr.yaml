apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-paddle-ocr
  namespace: rbi-cms
  labels:
    app: cms-paddle-ocr
    app.kubernetes.io/part-of: rbi-cms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cms-paddle-ocr
  template:
    metadata:
      labels:
        app: cms-paddle-ocr
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: cms-paddle-ocr
          image: image-registry.openshift-image-registry.svc:5000/rbi-cms/cms-paddle-ocr:latest
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: cms-paddle-ocr
  namespace: rbi-cms
spec:
  selector:
    app: cms-paddle-ocr
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
