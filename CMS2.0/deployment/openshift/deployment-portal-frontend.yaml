apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-portal-frontend
  namespace: rbi-cms
  labels:
    app: cms-portal-frontend
    app.kubernetes.io/part-of: rbi-cms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cms-portal-frontend
  template:
    metadata:
      labels:
        app: cms-portal-frontend
    spec:
      containers:
        - name: cms-portal-frontend
          image: image-registry.openshift-image-registry.svc:5000/rbi-cms/cms-portal-frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: cms-common-config
                  key: CMS_BACKEND_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cms-portal-frontend
  namespace: rbi-cms
spec:
  selector:
    app: cms-portal-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: cms-portal-frontend
  namespace: rbi-cms
spec:
  host: cms-portal.apps.openshift.example.com
  to:
    kind: Service
    name: cms-portal-frontend
  port:
    targetPort: 80
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
