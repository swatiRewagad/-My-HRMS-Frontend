apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-workflow-service
  namespace: rbi-cms
  labels:
    app: cms-workflow-service
    app.kubernetes.io/part-of: rbi-cms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cms-workflow-service
  template:
    metadata:
      labels:
        app: cms-workflow-service
    spec:
      containers:
        - name: cms-workflow-service
          image: registry.rbi.internal/cms/workflow-service:1.0.0-SNAPSHOT
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: cms-common-config
            - secretRef:
                name: cms-db-credentials
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /cms-workflow/actuator/health/liveness
              port: 8083
            initialDelaySeconds: 90
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /cms-workflow/actuator/health/readiness
              port: 8083
            initialDelaySeconds: 45
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cms-workflow-service
  namespace: rbi-cms
spec:
  selector:
    app: cms-workflow-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
