apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: cms-python-ocr-pipeline
  namespace: rbi-cms
spec:
  params:
    - name: GIT_URL
      type: string
      description: Git repository URL for paddle-ocr service
    - name: GIT_REVISION
      type: string
      default: main
    - name: IMAGE_TAG
      type: string
      default: latest
  workspaces:
    - name: shared-workspace
  tasks:
    - name: fetch-source
      taskRef:
        name: git-clone
        kind: ClusterTask
      workspaces:
        - name: output
          workspace: shared-workspace
      params:
        - name: url
          value: $(params.GIT_URL)
        - name: revision
          value: $(params.GIT_REVISION)

    - name: build-push-image
      taskRef:
        name: buildah
        kind: ClusterTask
      runAfter:
        - fetch-source
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: IMAGE
          value: image-registry.openshift-image-registry.svc:5000/rbi-cms/cms-paddle-ocr:$(params.IMAGE_TAG)
        - name: DOCKERFILE
          value: ./Dockerfile

    - name: deploy
      taskRef:
        name: openshift-client
        kind: ClusterTask
      runAfter:
        - build-push-image
      params:
        - name: SCRIPT
          value: |
            oc rollout restart deployment/cms-paddle-ocr -n rbi-cms
            oc rollout status deployment/cms-paddle-ocr -n rbi-cms --timeout=300s
