server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ecm_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jackson:
    serialization:
      write-dates-as-timestamps: false

ecm:
  storage:
    root-path: ${ECM_STORAGE_PATH:C:/ecm-storage}
  llm:
    api-key: ${LLM_API_KEY:}
    api-url: ${LLM_API_URL:https://api.anthropic.com/v1/messages}
    model: ${LLM_MODEL:claude-sonnet-4-6-20250514}

logging:
  level:
    com.hrms.ecm: DEBUG
