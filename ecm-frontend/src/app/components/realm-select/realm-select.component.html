<div class="realm-select-page">
  <div class="realm-card">
    <div class="realm-header">
      <i class="pi pi-box"></i>
      <h1>KAVACH</h1>
      <p>Enterprise Content Management</p>
    </div>
    <div class="realm-body">
      @if (step === 'realm') {
        <h3>Select Realm</h3>
        <p class="realm-subtitle">Choose the realm to access your documents</p>
        <div class="form-group">
          <select [(ngModel)]="selectedRealmName" class="realm-dropdown">
            <option value="" disabled>-- Select a Realm --</option>
            @for (realm of realms; track realm.name) {
              <option [value]="realm.name">{{ realm.displayName }}</option>
            }
          </select>
        </div>
        <button class="btn-continue" (click)="proceed()" [disabled]="!selectedRealmName">
          Continue <i class="pi pi-arrow-right"></i>
        </button>
      }

      @if (step === 'login') {
        <div class="login-back" (click)="goBackToRealm()">
          <i class="pi pi-arrow-left"></i> Change Realm
        </div>
        <h3>Sign In</h3>
        <p class="realm-subtitle">Enter your credentials for <strong>{{ selectedRealmName }}</strong></p>

        @if (loginError) {
          <div class="login-error">
            <i class="pi pi-exclamation-circle"></i>
            {{ loginError }}
          </div>
        }

        <div class="form-group">
          <label>Username</label>
          <input type="text" [(ngModel)]="username" placeholder="Enter username"
                 (keyup.enter)="login()" [disabled]="loggingIn" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="password" placeholder="Enter password"
                 (keyup.enter)="login()" [disabled]="loggingIn" />
        </div>
        <button class="btn-continue" (click)="login()" [disabled]="!username || !password || loggingIn">
          @if (loggingIn) {
            <i class="pi pi-spinner pi-spin"></i> Signing in...
          } @else {
            Sign In <i class="pi pi-sign-in"></i>
          }
        </button>
      }
    </div>
  </div>
</div>
