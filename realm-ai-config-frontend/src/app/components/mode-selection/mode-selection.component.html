<div class="mode-selection">
  <div class="section-header">
    <div class="title">Select Mode</div>
    <div class="subtitle">Choose how you want to interact with the platform services for this realm.</div>
  </div>

  <div class="mode-cards">
    @for (mode of modeOptions; track mode.value) {
      <button
        type="button"
        class="mode-card"
        [class.selected]="selectedMode === mode.value"
        [style.border-color]="selectedMode === mode.value ? mode.color : '#e2e8f0'"
        [style.background]="selectedMode === mode.value ? mode.bg : 'white'"
        [style.box-shadow]="selectedMode === mode.value ? '0 0 0 3px ' + mode.color + '22' : 'none'"
        (click)="selectMode(mode.value)"
      >
        <div class="card-top">
          <div
            class="mode-icon"
            [style.background]="selectedMode === mode.value ? mode.color : '#f1f5f9'"
            [style.color]="selectedMode === mode.value ? 'white' : '#94a3b8'"
          >
            @if (mode.value === 'app-designer') {
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M3 3h8v8H3zm10 0h8v8h-8zM3 13h8v8H3zm13 2v3h-3v2h3v3h2v-3h3v-2h-3v-3z" fill="currentColor"/>
              </svg>
            } @else {
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z" fill="currentColor"/>
              </svg>
            }
          </div>
          <div
            class="radio-circle"
            [style.border-color]="selectedMode === mode.value ? mode.color : '#d1d7e0'"
            [style.background]="selectedMode === mode.value ? mode.color : 'white'"
          >
            @if (selectedMode === mode.value) {
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
                <path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z" fill="white"/>
              </svg>
            }
          </div>
        </div>

        <div class="card-body">
          <div class="mode-label" [style.color]="selectedMode === mode.value ? mode.color : undefined">
            {{ mode.label }}
          </div>
          <div class="mode-desc">{{ mode.description }}</div>
        </div>

        <ul class="feature-list">
          @for (feature of mode.features; track feature) {
            <li>
              <span class="feature-dot" [style.background]="selectedMode === mode.value ? mode.color : '#c0c8d4'"></span>
              <span class="feature-text">{{ feature }}</span>
            </li>
          }
        </ul>
      </button>
    }
  </div>
</div>
